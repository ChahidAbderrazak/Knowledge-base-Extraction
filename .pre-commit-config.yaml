fail_fast: true

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check
        language: system
        types: [python]
        args: [--line-length=180]
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        args: [--line-length=180]