repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: .venv/bin/python
        language: system
        types: [python]
        args: [-m, ruff, check, --line-length=180]
      - id: ruff-format
        name: ruff format
        entry: .venv/bin/python
        language: system
        types: [python]
        args: [-m, ruff, format, --line-length=180]